services:
  finance-api:
    build:
      context: ./backend
      dockerfile: src/FinanceOptimizer.Api/Dockerfile
    container_name: financeoptimizer-api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=finance-postgres;Port=5432;Database=financeoptimizer;Username=finance;Password=finance_password
    depends_on:
      finance-postgres:
        condition: service_healthy

  finance-postgres:
    image: postgres:17
    container_name: financeoptimizer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: financeoptimizer
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance_password
    ports:
      - "5432:5432"
    volumes:
      - financeoptimizer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d financeoptimizer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  financeoptimizer_postgres_data: